name: RECEH Stabilizer Bot

on:
  schedule:
    - cron: '0 * * * *'  # Setiap jam
  workflow_dispatch:  # Bisa run manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ethers
        run: npm install ethers@5.7.2
        
      - name: Run Bot
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: node bot-runner.js
